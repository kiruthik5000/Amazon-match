# ── Demo mode — no authentication required ───────────────
# ── Server ────────────────────────────────────────────────
server.port=${PORT:8080}

# ── CORS ──────────────────────────────────────────────────
# Set ALLOWED_ORIGINS env var to your deployed frontend URL(s), comma-separated.
# Example: ALLOWED_ORIGINS=https://rematch-419b1.web.app,https://rematch-419b1.firebaseapp.com

# ── MySQL Datasource ──────────────────────────────────────
# Locally: uses root/root on 127.0.0.1
# On Railway/Render: set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/amazon_rematch?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Jackson ───────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── File Upload ──────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=55MB

# ── App Upload Config ─────────────────────────────────────
app.upload.dir=uploads
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ── Logging ───────────────────────────────────────────────
logging.level.com.amazon.rematch=DEBUG

# ── AWS Bedrock ───────────────────────────────────────────
# Set real values here (or via environment variables) to enable AI features.
# Without real credentials the app still starts; AI calls return fallback text.
aws.region=${AWS_REGION:us-east-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:PLACEHOLDER}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:PLACEHOLDER}
# Claude 3 Haiku — fast and cost-efficient for hackathon use
bedrock.modelId=anthropic.claude-3-haiku-20240307-v1:0
bedrock.maxTokens=300
bedrock.temperature=0.4

# ── Condition Analyzer (FastAPI) ──────────────────────────
condition-analyzer.base-url=http://localhost:8000
condition-analyzer.connect-timeout-ms=3000
condition-analyzer.read-timeout-ms=15000
condition-analyzer.max-retries=2

# ── Price Predictor (FastAPI) ─────────────────────────────
price-predictor.base-url=http://localhost:8002
price-predictor.max-retries=2
