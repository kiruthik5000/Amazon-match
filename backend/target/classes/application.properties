# ── JWT ──────────────────────────────────────────────────
# IMPORTANT: override these via environment variables in production
# export JWT_SECRET=<your-32+-char-secret>  export JWT_EXPIRATION_MS=86400000
jwt.secret=${JWT_SECRET:RematchSuperSecretKeyForJWTSigningMustBe32BytesLong!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# ── Server ────────────────────────────────────────────────
server.port=8080

# ── MySQL Datasource ──────────────────────────────────────
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/amazon_rematch?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Jackson ───────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── File Upload ──────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=55MB

# ── App Upload Config ─────────────────────────────────────
app.upload.dir=uploads
app.base-url=http://localhost:8080

# ── Logging ───────────────────────────────────────────────
logging.level.com.amazon.rematch=DEBUG

# ── AWS Bedrock ───────────────────────────────────────────
# aws.region=us-east-1
# aws.accessKeyId=<your-access-key-id>
# aws.secretAccessKey=<your-secret-access-key>
# Claude 3 Haiku — fast and cost-efficient for hackathon use
bedrock.modelId=anthropic.claude-3-haiku-20240307-v1:0
bedrock.maxTokens=300
bedrock.temperature=0.4

# ── Condition Analyzer (FastAPI) ──────────────────────────
condition-analyzer.base-url=http://localhost:8000
condition-analyzer.connect-timeout-ms=3000
condition-analyzer.read-timeout-ms=15000
condition-analyzer.max-retries=2

# ── Price Predictor (FastAPI) ─────────────────────────────
price-predictor.base-url=http://localhost:8002
price-predictor.max-retries=2
