services:
  db:
    image: mysql:8.0
    container_name: amazon-watch-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: amazon_rematch
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  ai-services:
    build: ./ai-services
    container_name: amazon-watch-ai
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    container_name: amazon-watch-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/amazon_rematch?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - AI_SERVICES_URL=http://ai-services:8000
      - APP_BASE_URL=http://localhost:8080
    depends_on:
      - db
      - ai-services
    volumes:
      - backend-uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8080
    container_name: amazon-watch-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  backend-uploads:
